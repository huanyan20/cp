[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-q"

[tool.ruff]
line-length = 88
target-version = "py312"
exclude = [
    "env",
    ".venv",
    "__pycache__",
    ".cache",
    "results_dir",
    "models_dir",
    "archive",
    "scripts",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = [
    "E501",
]

[tool.ruff.lint.per-file-ignores]
"tests/*.py" = ["B011"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
warn_unused_configs = true
exclude = ["^archive/", "^scripts/"]
